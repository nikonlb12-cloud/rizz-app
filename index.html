<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rizz — Your AI-powered charm coach. Craft the perfect reply every time.">
  <title>Rizz — AI Charm Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <!-- Ambient Background -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- App Container -->
  <div class="app-container">
    
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-left">
        <div class="logo-mark">
          <span class="logo-icon">⚡</span>
        </div>
        <div class="logo-text">
          <h1>Rizz</h1>
          <span class="tagline">AI Charm Coach</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="btn-clear" title="New conversation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <button class="btn-icon" id="btn-history" title="History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Chat Area -->
    <main class="chat-area" id="chat-area">

      <!-- Welcome Screen -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">⚡</div>
        <h2 class="welcome-title">What did they say?</h2>
        <p class="welcome-sub">Paste their message or drop a screenshot below and I'll craft the perfect reply.</p>
        <div class="quick-examples">
          <button class="example-chip" data-example="Hey, I noticed you like hiking too! What's your favorite trail?">
            <span class="chip-emoji">🥾</span> "Hey, I noticed you like hiking too!"
          </button>
          <button class="example-chip" data-example="You're really cute btw 😊">
            <span class="chip-emoji">😊</span> "You're really cute btw"
          </button>
          <button class="example-chip" data-example="So what do you do for fun?">
            <span class="chip-emoji">🎯</span> "So what do you do for fun?"
          </button>
          <button class="example-chip" data-example="I had such a great time last night!">
            <span class="chip-emoji">✨</span> "I had a great time last night!"
          </button>
          <button class="example-chip" data-example="Hey">
            <span class="chip-emoji">👋</span> "Hey" (the dry text)
          </button>
          <button class="example-chip" data-example="Why did you take so long to reply? 😒">
            <span class="chip-emoji">😬</span> "Why'd you take so long to reply?"
          </button>
        </div>
      </div>

      <!-- Messages Container -->
      <div class="messages-container" id="messages-container"></div>

      <!-- Drag & Drop Overlay -->
      <div class="drop-overlay" id="drop-overlay">
        <div class="drop-overlay-content">
          <div class="drop-icon">📸</div>
          <div class="drop-text">Drop screenshots here</div>
          <div class="drop-hint">Supports multiple images</div>
        </div>
      </div>

    </main>

    <!-- Input Area -->
    <div class="input-area" id="input-area">
      <!-- Stage Selector -->
      <div class="stage-selector" id="stage-selector">
        <span class="stage-label">Stage:</span>
        <div class="stage-pills">
          <button class="stage-pill active" data-stage="cold" title="First message — haven't spoken yet">
            <span>🧊</span> Cold Open
          </button>
          <button class="stage-pill" data-stage="talking" title="Early convo — building rapport">
            <span>💬</span> Just Talking
          </button>
          <button class="stage-pill" data-stage="heating" title="Chemistry building — tension rising">
            <span>🔥</span> Heating Up
          </button>
          <button class="stage-pill" data-stage="closing" title="Strong connection — ready to escalate">
            <span>😈</span> Closing In
          </button>
        </div>
      </div>
      <!-- Vibe Selector -->
      <div class="vibe-selector" id="vibe-selector">
        <span class="vibe-label">Vibe:</span>
        <div class="vibe-pills">
          <button class="vibe-pill active" data-vibe="smooth" title="Confident & charming">
            <span>😏</span> Smooth
          </button>
          <button class="vibe-pill" data-vibe="witty" title="Funny & clever">
            <span>😂</span> Witty
          </button>
          <button class="vibe-pill" data-vibe="bold" title="Direct & assertive">
            <span>🔥</span> Bold
          </button>
          <button class="vibe-pill" data-vibe="flirty" title="Playful & teasing">
            <span>😘</span> Flirty
          </button>
          <button class="vibe-pill" data-vibe="mysterious" title="Aloof & intriguing">
            <span>🌙</span> Mysterious
          </button>
        </div>
      </div>
      <!-- Image Preview Strip (dynamic) -->
      <div class="image-preview-strip" id="image-preview-strip"></div>
      <!-- OCR Status -->
      <div class="ocr-status" id="ocr-status">
        <div class="ocr-spinner"></div>
        <span class="ocr-status-text" id="ocr-status-text">Reading screenshots...</span>
      </div>
      <!-- Hidden File Input -->
      <input type="file" id="file-input" accept="image/*" multiple hidden>
      <!-- Text Input -->
      <div class="input-wrapper">
        <button class="btn-upload" id="btn-upload" title="Upload screenshot">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <textarea 
          id="message-input" 
          placeholder="Paste their message or hit send for starters..." 
          rows="1"
          maxlength="1000"
        ></textarea>
        <button class="btn-send" id="btn-send" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="char-count" id="char-count">0 / 1000</span>
      </div>
    </div>

  </div>

  <!-- History Sidebar -->
  <div class="history-overlay" id="history-overlay"></div>
  <aside class="history-sidebar" id="history-sidebar">
    <div class="history-header">
      <h3>History</h3>
      <button class="btn-icon btn-close-history" id="btn-close-history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">
        <span>🕐</span>
        <p>No history yet. Start cooking!</p>
      </div>
    </div>
    <button class="btn-clear-history" id="btn-clear-history">Clear All History</button>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span class="toast-text" id="toast-text">Copied to clipboard</span>
  </div>

  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
